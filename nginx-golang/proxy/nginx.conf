# NGINX config for the awesome-compose nginx-golang sample.
# This file is bind-mounted into /etc/nginx/conf.d/default.conf, so it
# is included by the stock image's top-level `http { }` context at startup.

# A virtual server. Multiple `server { }` blocks can coexist and are
# selected by `listen` port + `server_name`.
# https://nginx.org/en/docs/http/ngx_http_core_module.html#server
server {
  # Accept HTTP connections on port 80 inside the container. The host
  # port mapping is defined in compose.yaml.
  # https://nginx.org/en/docs/http/ngx_http_core_module.html#listen
  listen 80;

  # Match all request URIs (prefix match on `/`). With no other
  # locations defined, every request lands here.
  # https://nginx.org/en/docs/http/ngx_http_core_module.html#location
  location / {
    # Forward the request to the Go backend. `backend` resolves via
    # Compose's embedded DNS to the `backend` service's container, and
    # :80 is the port the Go server listens on inside that container.
    # https://nginx.org/en/docs/http/ngx_http_proxy_module.html#proxy_pass
    proxy_pass http://backend:80;
  }
}
